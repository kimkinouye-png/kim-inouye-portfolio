<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="apw">
  <title id="apw">Aperi auto-score workflow with human override</title>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16162a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(200,0,94,0.5)"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="#C8005E" font-family="DM Mono, monospace" font-size="11" letter-spacing="0.16em">SCORING WORKFLOW</text>
  <text x="600" y="86" text-anchor="middle" fill="#f0ede6" font-family="DM Serif Display, serif" font-size="26">Auto-Score + Human Override</text>

  <!-- Step 1: Paste response -->
  <rect x="60" y="130" width="240" height="160" rx="12" fill="#1c1c34" stroke="rgba(200,0,94,0.3)" stroke-width="1.5"/>
  <text x="180" y="158" text-anchor="middle" fill="#C8005E" font-family="DM Mono, monospace" font-size="10" letter-spacing="0.1em">STEP 1</text>
  <text x="180" y="184" text-anchor="middle" fill="#f0ede6" font-family="DM Sans, sans-serif" font-size="14" font-weight="600">Set Context</text>
  <line x1="110" y1="196" x2="250" y2="196" stroke="rgba(200,0,94,0.15)" stroke-width="1"/>
  <text x="180" y="218" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">Persona (Priya / Dara / Marcus)</text>
  <text x="180" y="238" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">Severity tier (1-4)</text>
  <text x="180" y="258" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">Emotional framing</text>
  <text x="180" y="278" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">Paste Rose's response</text>

  <!-- Arrow 1 -->
  <line x1="310" y1="210" x2="370" y2="210" stroke="rgba(200,0,94,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Auto-score -->
  <rect x="380" y="130" width="240" height="160" rx="12" fill="#1c1c34" stroke="rgba(200,0,94,0.3)" stroke-width="1.5"/>
  <text x="500" y="158" text-anchor="middle" fill="#C8005E" font-family="DM Mono, monospace" font-size="10" letter-spacing="0.1em">STEP 2</text>
  <text x="500" y="184" text-anchor="middle" fill="#f0ede6" font-family="DM Sans, sans-serif" font-size="14" font-weight="600">Auto-Score Fires</text>
  <line x1="430" y1="196" x2="570" y2="196" stroke="rgba(200,0,94,0.15)" stroke-width="1"/>
  <text x="500" y="218" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">Signal-word heuristic scans</text>
  <text x="500" y="238" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">response text for patterns:</text>
  <text x="500" y="260" text-anchor="middle" fill="rgba(200,0,94,0.6)" font-family="DM Mono, monospace" font-size="10">endorsement · perspective · growth</text>
  <text x="500" y="278" text-anchor="middle" fill="rgba(200,0,94,0.6)" font-family="DM Mono, monospace" font-size="10">drift · severity keywords</text>

  <!-- Arrow 2 -->
  <line x1="630" y1="210" x2="690" y2="210" stroke="rgba(200,0,94,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Human override -->
  <rect x="700" y="130" width="240" height="160" rx="12" fill="#1c1c34" stroke="rgba(200,0,94,0.3)" stroke-width="1.5"/>
  <text x="820" y="158" text-anchor="middle" fill="#C8005E" font-family="DM Mono, monospace" font-size="10" letter-spacing="0.1em">STEP 3</text>
  <text x="820" y="184" text-anchor="middle" fill="#f0ede6" font-family="DM Sans, sans-serif" font-size="14" font-weight="600">Human Override</text>
  <line x1="750" y1="196" x2="890" y2="196" stroke="rgba(200,0,94,0.15)" stroke-width="1"/>
  <text x="820" y="218" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">Review pre-filled scores</text>
  <text x="820" y="238" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">Adjust any dimension (0-3)</text>
  <text x="820" y="258" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">Add notes per dimension</text>
  <text x="820" y="278" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">Log overall assessment</text>

  <!-- Arrow down from Step 3 -->
  <line x1="820" y1="300" x2="820" y2="350" stroke="rgba(200,0,94,0.5)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Persist -->
  <rect x="620" y="360" width="400" height="110" rx="12" fill="#1c1c34" stroke="rgba(200,0,94,0.3)" stroke-width="1.5"/>
  <text x="820" y="388" text-anchor="middle" fill="#C8005E" font-family="DM Mono, monospace" font-size="10" letter-spacing="0.1em">STEP 4</text>
  <text x="820" y="414" text-anchor="middle" fill="#f0ede6" font-family="DM Sans, sans-serif" font-size="14" font-weight="600">Log Run to Supabase</text>
  <line x1="670" y1="426" x2="970" y2="426" stroke="rgba(200,0,94,0.15)" stroke-width="1"/>
  <text x="820" y="450" text-anchor="middle" fill="rgba(240,237,230,0.55)" font-family="DM Sans, sans-serif" font-size="11">All 5 scores + notes + scenario context + overall score + timestamp</text>

  <!-- History view -->
  <rect x="60" y="360" width="440" height="110" rx="12" fill="rgba(200,0,94,0.04)" stroke="rgba(200,0,94,0.15)" stroke-width="1"/>
  <text x="280" y="392" text-anchor="middle" fill="#C8005E" font-family="DM Mono, monospace" font-size="10" letter-spacing="0.1em">HISTORY VIEW</text>
  <text x="280" y="418" text-anchor="middle" fill="#f0ede6" font-family="DM Sans, sans-serif" font-size="14" font-weight="600">Pattern Analysis Over Time</text>
  <line x1="110" y1="430" x2="450" y2="430" stroke="rgba(200,0,94,0.12)" stroke-width="1"/>
  <text x="280" y="454" text-anchor="middle" fill="rgba(240,237,230,0.5)" font-family="DM Sans, sans-serif" font-size="11">Browse all scored runs. Spot trends across personas, tiers, framings.</text>

  <!-- Arrow from persist to history -->
  <line x1="620" y1="415" x2="510" y2="415" stroke="rgba(200,0,94,0.35)" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <!-- Design decision callout -->
  <rect x="120" y="520" width="960" height="120" rx="12" fill="rgba(200,0,94,0.06)" stroke="rgba(200,0,94,0.12)" stroke-width="1"/>
  <text x="600" y="552" text-anchor="middle" fill="#C8005E" font-family="DM Mono, monospace" font-size="10" letter-spacing="0.1em">KEY DESIGN DECISIONS</text>
  <text x="300" y="582" text-anchor="middle" fill="rgba(240,237,230,0.6)" font-family="DM Sans, sans-serif" font-size="12" font-weight="300">Auto-score is a starting point, not an answer.</text>
  <text x="300" y="602" text-anchor="middle" fill="rgba(240,237,230,0.4)" font-family="DM Sans, sans-serif" font-size="11">Every score is human-overridable.</text>
  <text x="600" y="582" text-anchor="middle" fill="rgba(240,237,230,0.6)" font-family="DM Sans, sans-serif" font-size="12" font-weight="300">Portable core, swappable context module.</text>
  <text x="600" y="602" text-anchor="middle" fill="rgba(240,237,230,0.4)" font-family="DM Sans, sans-serif" font-size="11">Rose-specific today; adaptable tomorrow.</text>
  <text x="900" y="582" text-anchor="middle" fill="rgba(240,237,230,0.6)" font-family="DM Sans, sans-serif" font-size="12" font-weight="300">Client-side heuristic, no API calls.</text>
  <text x="900" y="602" text-anchor="middle" fill="rgba(240,237,230,0.4)" font-family="DM Sans, sans-serif" font-size="11">Instant feedback as you paste.</text>
</svg>